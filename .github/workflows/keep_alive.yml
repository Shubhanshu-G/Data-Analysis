name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping PJM Netload Forecasting App
        run: |
          python3 -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('https://pjmrtoanalysis.streamlit.app/', timeout=60)
              print('PJM App Status:', r.status)
          except Exception as e:
              print('PJM App pinged (waking up):', str(e)[:80])
          "

      - name: Ping Prompt Analysis App
        run: |
          python3 -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('https://promptevaluation.streamlit.app/', timeout=60)
              print('Prompt App Status:', r.status)
          except Exception as e:
              print('Prompt App pinged (waking up):', str(e)[:80])
          "

      - name: Done
        run: echo "Both apps pinged at $(date)"
