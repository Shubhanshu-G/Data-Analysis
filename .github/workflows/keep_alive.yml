name: Keep Streamlit Apps Alive

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  # Allows you to trigger this manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests -q

      - name: Ping PJM Netload Forecasting App
        run: |
          python3 - <<'EOF'
          import requests
          url = "https://pjmrtoanalysis.streamlit.app/"
          try:
              r = requests.get(url, timeout=60, allow_redirects=True)
              print(f"✅ PJM Netload App - HTTP Status: {r.status_code}")
          except Exception as e:
              print(f"⚠️ PJM Netload App - Error: {e}")
          EOF

      - name: Ping Prompt Analysis App
        run: |
          python3 - <<'EOF'
          import requests
          url = "https://promptevaluation.streamlit.app/"
          try:
              r = requests.get(url, timeout=60, allow_redirects=True)
              print(f"✅ Prompt Analysis App - HTTP Status: {r.status_code}")
          except Exception as e:
              print(f"⚠️ Prompt Analysis App - Error: {e}")
          EOF

      - name: Done
        run: echo "✅ Both apps pinged at $(date)"
